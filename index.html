<!DOCTYPE html>
<html>
<head>
  <title>Are You Undercharging?</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      max-width: 600px;
      margin: auto;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      margin-bottom: 15px;
    }
    button {
      padding: 15px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }
    .result {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>Are You Undercharging?</h1>
<p>Quickly check if one of your services is actually making you money</p>

<div class="card">
  <label>What do you charge?</label>
  <input id="price" value="85">

  <label>How long does it take? (minutes)</label>
  <input id="minutes" value="60">

  <label>Product cost per client (estimate)</label>
  <input id="product" value="8">

  <label>Clients per week</label>
  <input id="clients" value="15">

  <button onclick="calc()">Check My Pricing</button>
</div>

<div class="card">
  <div class="result" id="real"></div>
  <div class="result" id="market"></div>
  <div class="result" id="gap"></div>
  <p id="insight"></p>
</div>

<script>
function calc() {
  let price = Number(price.value);
  let minutes = Number(minutes.value);
  let product = Number(product.value);
  let weeklyClients = Number(clients.value);

  let monthlyClients = weeklyClients * 4;
  let overhead = 1200; // fixed assumption

  let overheadPer = overhead / monthlyClients;
  let hours = minutes / 60;

  let cost = product + overheadPer;

  let baseHourly = 50;
  let buffer = 1.3;

  let recommended = cost + (baseHourly * hours * buffer);

  let realHourly = (price - cost) / hours;
  let adjustedHourly = realHourly * 0.75;

  let low = Math.round(recommended);
  let high = Math.round(recommended * 1.15);

  let gap = Math.round(low - price);

  document.getElementById("real").innerText =
    "You’re likely earning about $" + adjustedHourly.toFixed(0) + "/hr";

  document.getElementById("market").innerText =
    "Similar services are often priced around $" + low + "–$" + high;

  if (gap > 0) {
    document.getElementById("gap").innerText =
      "You may be undercharging by about $" + gap + " per service";
  } else {
    document.getElementById("gap").innerText =
      "Your pricing is within a strong range";
  }

  document.getElementById("insight").innerText =
    "This estimate includes product cost, business overhead, and real-world scheduling gaps.";
}
</script>

</body>
</html>
