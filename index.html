<!DOCTYPE html>
<html>
<head>
  <title>EsthYes — Pricing Reality Check</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      max-width: 700px;
      margin: auto;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
    }
    button {
      padding: 15px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      margin-top: 10px;
    }
    .result {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .small {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<h1>Are You Undercharging?</h1>
<p>Check if your service is actually making you money</p>

<div class="card">
  <label>What do you charge?</label>
  <input id="price" value="85">

  <label>How long does it take? (minutes)</label>
  <input id="minutes" value="60">

  <label>Product cost per client</label>
  <input id="product" value="8">

  <label>Monthly overhead</label>
  <input id="overhead" value="1200">

  <label>Clients per week</label>
  <input id="clients" value="15">

  <button onclick="calc()">Check My Pricing</button>
</div>

<div class="card">
  <div class="result" id="headline"></div>
  <div class="result" id="hourly"></div>
  <div class="result" id="range"></div>
  <div class="result" id="monthly"></div>
  <div class="result" id="whatif"></div>

  <p class="small">
    Estimates include overhead, product cost, and typical booking gaps (~75% utilization).
  </p>
</div>

<script>
function calc() {
  let price = Number(document.getElementById("price").value);
  let minutes = Number(document.getElementById("minutes").value);
  let product = Number(document.getElementById("product").value);
  let overhead = Number(document.getElementById("overhead").value);
  let weeklyClients = Number(document.getElementById("clients").value);

  let monthlyClients = weeklyClients * 4;
  let hours = minutes / 60;

  let overheadPer = overhead / monthlyClients;
  let cost = product + overheadPer;

  let bookedHourly = (price - cost) / hours;
  let realHourly = bookedHourly * 0.75;

  let recommended = cost + (50 * hours * 1.3);
  let low = Math.ceil(recommended / 5) * 5;
  let high = Math.ceil((recommended * 1.15) / 5) * 5;

  let gap = low - price;

  let monthlyIncome = realHourly * hours * monthlyClients;

  let newHourly = ((low - cost) / hours) * 0.75;
  let newMonthly = newHourly * hours * monthlyClients;

  document.getElementById("headline").innerText =
    gap > 0 ? "You may be undercharging" : "Your pricing looks strong";

  document.getElementById("hourly").innerText =
    "Real earnings: $" + realHourly.toFixed(0) + "/hr";

  document.getElementById("range").innerText =
    "Stronger range: $" + low + "–$" + high;

  document.getElementById("monthly").innerText =
    "Monthly: $" + monthlyIncome.toFixed(0);

  document.getElementById("whatif").innerText =
    "If you charged $" + low +
    ": $" + newHourly.toFixed(0) + "/hr → $" +
    newMonthly.toFixed(0) + "/month";
}
</script>

</body>
</html>
