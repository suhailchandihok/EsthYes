<script>
const BENCHMARK_HOURLY = 50;
const PRICING_BUFFER = 1.3;
const REAL_WORLD_ADJUSTMENT = 0.75;

function money(num) {
  return "$" + Math.round(num);
}

function calculatePricing() {
  const price = Number(document.getElementById("price").value);
  const minutes = Number(document.getElementById("minutes").value);
  const product = Number(document.getElementById("product").value);
  const weeklyClients = Number(document.getElementById("clients").value);
  const overhead = Number(document.getElementById("overhead")?.value || 1200);

  if (!price || !minutes || !weeklyClients) {
    alert("Enter valid values");
    return;
  }

  const monthlyClients = weeklyClients * 4;
  const serviceHours = minutes / 60;

  const overheadPerService = overhead / monthlyClients;
  const cost = product + overheadPerService;

  const bookedHourly = (price - cost) / serviceHours;
  const adjustedHourly = bookedHourly * REAL_WORLD_ADJUSTMENT;

  const recommendedBase = cost + (BENCHMARK_HOURLY * serviceHours * PRICING_BUFFER);
  const low = Math.ceil(recommendedBase / 5) * 5;
  const high = Math.ceil((recommendedBase * 1.15) / 5) * 5;

  const gap = Math.round(low - price);

  // 🔥 NEW: Monthly income
  const monthlyIncome = adjustedHourly * serviceHours * monthlyClients;

  // 🔥 NEW: If they raise price
  const newPrice = low;
  const newHourly = ((newPrice - cost) / serviceHours) * REAL_WORLD_ADJUSTMENT;
  const newMonthly = newHourly * serviceHours * monthlyClients;

  // ===== UI OUTPUT =====

  document.getElementById("earningsValue").innerText = money(adjustedHourly) + "/hr";
  document.getElementById("rangeValue").innerText = money(low) + "–" + money(high);

  // 🔥 ADD THIS BLOCK TO YOUR HTML (see below)
  document.getElementById("monthlyIncome").innerText =
    "≈ " + money(monthlyIncome) + "/month at current pricing";

  document.getElementById("whatIf").innerText =
    "If you charged " + money(newPrice) +
    ", you'd earn ~" + money(newHourly) +
    "/hr and ~" + money(newMonthly) + "/month";

  document.getElementById("assumptions").innerText =
    "Estimates assume ~75% booking utilization, typical downtime, and a target earning benchmark of ~$50/hr.";

  if (gap > 0) {
    document.getElementById("headline").innerText = "You may be undercharging this service.";
  } else {
    document.getElementById("headline").innerText = "Your pricing looks strong.";
  }
}
</script>
